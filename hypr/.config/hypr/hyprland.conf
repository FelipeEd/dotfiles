# #######################################################################################
# HYPRLAND CONFIGURATION
# Felipe's Arch Linux + Hyprland Setup
# #######################################################################################
#
# This configuration is modularized for easier maintenance.
# All specific settings are in separate files under conf.d/
#
# Refer to the wiki for more information:
# https://wiki.hyprland.org/Configuring/
#
# #######################################################################################

# ============================
# MODULAR CONFIGURATION
# ============================
# Load all configuration modules

source = ~/.config/hypr/conf.d/env.conf         # Environment variables
source = ~/.config/hypr/conf.d/monitors.conf    # Monitor configuration
source = ~/.config/hypr/conf.d/programs.conf    # Program definitions
source = ~/.config/hypr/conf.d/autostart.conf   # Autostart applications
source = ~/.config/hypr/conf.d/appearance.conf  # Look and feel (general, decoration, animations)
source = ~/.config/hypr/conf.d/input.conf       # Input devices (keyboard, mouse, touchpad)
source = ~/.config/hypr/conf.d/keybinds.conf    # All keybindings
source = ~/.config/hypr/conf.d/rules.conf       # Window and workspace rules
